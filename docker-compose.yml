services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: durable_ai
      POSTGRES_PASSWORD: durable_ai
      POSTGRES_DB: durable_ai
    ports:
      - "5432:5432"
    volumes:
      - durable_ai_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    environment:
      DATABASE_URL: postgresql://durable_ai:durable_ai@postgres:5432/durable_ai
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4.1-mini
      MAX_JOB_ATTEMPTS: 3
      DEFAULT_MAX_COST_USD: 1.00
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: >
      celery
      -A app.workers.celery_app.celery_app
      worker
      --loglevel=info
    environment:
      DATABASE_URL: postgresql://durable_ai:durable_ai@postgres:5432/durable_ai
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4.1-mini
      MAX_JOB_ATTEMPTS: 3
      DEFAULT_MAX_COST_USD: 1.00
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

volumes:
  durable_ai_postgres_data: