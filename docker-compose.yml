services:
  postgres:
    image: postgres:16
    container_name: durable-ai-postgres
    environment:
      POSTGRES_USER: durable_ai
      POSTGRES_PASSWORD: durable_ai
      POSTGRES_DB: durable_ai
    ports:
      - "5432:5432"
    volumes:
      - durable_ai_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: durable-ai-redis
    ports:
      - "6379:6379"

volumes:
  durable_ai_postgres_data: